version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: salesmate-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: salesmate
      POSTGRES_DB: ai_agent
    ports:
      - "5434:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
